apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workload-queue-role
  namespace: canfar-workload
rules:
- apiGroups:
  - kueue.x-k8s.io
  resources:
  - localqueues
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workload-queue-binding
  namespace: canfar-workload
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workload-queue-role
subjects:
- kind: ServiceAccount
  name: skaha-service-account
  namespace: canfar-workload