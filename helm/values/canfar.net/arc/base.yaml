# Shared defaults for arc (Cavern Helm chart:
# opencadc/deployments/helm/applications/cavern).
# Ingress serves the app at path deployment.cavern.endpoint (`/arc`).
#
# Image and many nested defaults: use the chart’s values.yaml (chart version / appVersion).
# Replace storage, filesystem ownership, and identity/registry IDs to match your cluster.
# The keel-prod Kubernetes cluster domain

kubernetesClusterDomain: keel-prod.local

# Tell Kubernetes to spin up multiple instances.  Defaults to 1.
replicaCount: 3

# Arc web service deployment
deployment:
  cavern:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
          - key: skaha.opencadc.org/node-type
            operator: In
            values:
            - service-node
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.count
            operator: DoesNotExist

    # How this Cavern instance identifies itself.
    resourceID: "ivo://cadc.nrc.ca/arc"

    # The Resource ID of the Service that contains the POSIX Mapping information.  Those URI values that do not use an http(s) scheme
    # will be looked up in the registry provided by the registryURL.
    posixMapperResourceID: "ivo://cadc.nrc.ca/gms"

    # URI or URL of the OIDC server.  For CANFAR, this is just to round out the cadc-registry.properties.
    oidcURI: "ivo://cadc.nrc.ca/gms"

    # ID (URI) of the GMS Service.
    gmsID: "ivo://cadc.nrc.ca/gms"

    quotaPlugin: CephFSQuotaPlugin
    
    # User Allocation settings.  This is used to create new folders under the main root allocation folders, namely /home and /projects.
    allocations:
      # Required.  The default size, in GB, of an allocation.  This is used in the absence of the Quota VOSpace property.  Can be a floating point number.
      # Provided value is 10 (10 GiB) by default.
      # Example:
      #   defaultSizeGB: 25.5
      defaultSizeGB: 200

    filesystem:
      # persistent data directory in container
      dataDir: "/cephfs"

      # RELATIVE path to the node/file content that could be mounted in other containers
      subPath: "cavern"

      # Who owns the parent folder(s)
      rootOwner: 
        adminUsername: "canfarops"
        username: "canfarops"
        uid: 25660
        gid: 25660

    # The IdentityManager class handling authentication.  From within the CADC,
    # The AC service is used for authentication, so set the appropriate
    # Identity Manager class here.
    identityManagerClass: ca.nrc.cadc.ac.ACIdentityManager

    # Rename the application from the default "cavern" to "arc".
    applicationName: "arc"

    # The endpoint to serve this from.  Defaults to /cavern.  If the applicationName is changed, then this should match.
    # Don't forget to update your registry entries!
    endpoint: "/arc"

    # Resources provided to the Arc service.
    resources:
      requests:
        memory: "4Gi"
        cpu: "1"
      limits:
        memory: "4Gi"
        cpu: "4"

    # Other volume mount details on mounting volumes declared in the extraVolumes section can be set here.
    extraVolumeMounts:
      # Still requires the servops certificate for service to service calls.  This will be
      # used to mount the cadcproxy.pem in the servops-cert volume.
      - mountPath: /root/.ssl/
        name: servops-cert
        readOnly: true
      - mountPath: "/config/RsaSignaturePub.key"
        name: rsa-public-key-volume
        subPath: RsaSignaturePub.key

    # Other volumes that will be used in the deployment, that don't fit into the general
    # template scheme (i.e. not used by all installations).
    extraVolumes:
      # Declare the servops certificate volume to be mounted in extraVolumeMounts.  The 
      # servops-clientcert is expected to exist.
      - name: servops-cert
        secret:
          defaultMode: 420
          secretName: servops-clientcert
      - name: rsa-public-key-volume
        secret:
          defaultMode: 420
          secretName: access-rsa-keys
