kubernetesClusterDomain: keel-prod.local

replicaCount: 3

# Optional science-platform Metrics API (same Helm release as Skaha).
# Kueue alignment: ClusterQueues `cadc` and `ska` — see
# keel-deploy/helm/values/canfar.net/kueue/clusterQueues/prod.cadc.yml,
# keel-deploy/helm/values/canfar.net/kueue/clusterQueues/prod.ska.yml, and
# keel-deploy/helm/values/canfar.net/kueue/controller/controller.config.yml
# (METRICS_* names follow science-platform/metrics docs/environment-contracts.md).
# METRICS_REDIS_URL is injected by the Skaha chart from this release's Bitnami Redis when metricsBackend.redis.enabled is true.
# METRICS_ENVIRONMENT is set per Argo overlay (staging.yaml, integration.yaml, prod.yaml) to match the deployment hostname tier.
metricsBackend:
  enabled: true
  rbac:
    enabled: false
  image:
    tag: v0.1.5
  env:
    METRICS_ENVIRONMENT: "staging"
    METRICS_CLUSTER_NAME: "canfar"
    METRICS_SOURCES__PLATFORM: "kueue"
    METRICS_CACHE__BACKEND: "redis"
    METRICS_CACHE__TTL_SECONDS: "300"
    METRICS_CACHE__SCOPE_TTL_SECONDS: '{"platform":300}'
    METRICS_OTEL_METRICS_ENABLED: "false"
    METRICS_PROVIDERS__KUEUE__KUBE_API_URL: "https://kubernetes.default.svc"
    METRICS_PROVIDERS__KUEUE__KUBE_VERIFY_TLS: "true"
    METRICS_PROVIDERS__KUEUE__CLUSTER_QUEUES: '["cadc","ska"]'
    METRICS_PROVIDERS__KUEUE__TOKEN_FILE: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    METRICS_PROVIDERS__KUEUE__CA_FILE: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

autoscaling:
  minReplicas: 3
  maxReplicas: 3

deployment:
  hostname: staging.canfar.net

  skaha:
    image: images-rc.canfar.net/skaha-system/skaha:1.3.1-rc.1
    registryURL:
      - https://staging.canfar.net/reg

    sessions:
      hostname: workloads.canfar.net
      namespace: 
        name: canfar-workloads
        create: true
      userStorage:
        nodeURIPrefix: "vos://cadc.nrc.ca~arc"
        spec:
          cephfs:
            monitors:
              - 10.30.201.3:6789
              - 10.30.202.3:6789
              - 10.30.203.3:6789
            path: /volumes/_nogroup/054e398e-a08e-425e-9f7c-fc394362e38e
            user: keel-prod-admin
            secretRef:
              name: cephfs-cephx-admin-key
            readOnly: false
      kueue:
        rbac:
          create: true
        default:
          queueName: "cadc-default"
          priorityClass: "high"
        headless:
          queueName: "cadc-default"
          priorityClass: "low"

      # Values that represent boundaries for the session resources.  Tune to your Cluster's capacity.
      limitRange:
        enabled: true
        rbac:
          create: true
        spec:
          # -- max is the maximum allowed requested for 'fixed' User Sessions.
          max:
            memory: "192Gi"
            cpu: "16"
            nvidia.com/gpu: "8"
          # -- default is the default limits for 'flex' User Sessions.  These Sessions will grow until this limit is reached.
          default:
            memory: "32Gi"
            cpu: "16"
            nvidia.com/gpu: "0"
          # -- defaultRequest is the default requests for 'flex' User Sessions.  All flex sessions will start with this request.
          defaultRequest:
            memory: "4Gi"
            cpu: "1"
            nvidia.com/gpu: "0"

      authorization:
        group:
          enabled: true
          uri: "ivo://cadc.nrc.ca/gms?skaha-users"

rbac:
  # Whether to create RBAC roles and bindings for Skaha.  Defaults to true.
  create: true

  # Whether to create a ClusterRole with read-only permissions for Skaha to query Nodes for their capacity.
  # This is used to provide information to the Science Portal UI about available resources in the cluster.
  # A simple node: list permission is granted, but this does require elevated privileges, so it is optional and defaults to false.
  clusterRole:
    create: false

serviceAccount:
  create: true
