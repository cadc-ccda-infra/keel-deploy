kubernetesClusterDomain: keel-prod.local

replicaCount: 3

deployment:
  hostname: staging.canfar.net

  skaha:
    image: images.opencadc.org/platform/skaha@sha256:7401d0339a7efd69cd0d4f47bf3d472850b67de4313cf03f3f053b6b0ca9a3a5
    registryURL:
      - https://staging.canfar.net/reg

    sessions:
      hostname: workloads.canfar.net
      namespace: canfar-workloads
      userStorage:
        spec:
          cephfs:
            monitors:
            - 10.30.201.3:6789
            - 10.30.202.3:6789
            - 10.30.203.3:6789
            path: /volumes/_nogroup/054e398e-a08e-425e-9f7c-fc394362e38e
            user: keel-prod-admin
            secretRef:
              name: cephfs-cephx-admin-key
            readOnly: false
      kueue:
        rbac:
          create: true
        default:
          queueName: "cadc-default"
          priorityClass: "high"
        headless:
          queueName: "cadc-default"
          priorityClass: "low"

      limitRange:
        enabled: true
        rbac:
          create: false
        spec:
          max:  # maximum allowed requested
            memory: "192Gi"
            cpu: "16"
            nvidia.com/gpu: "8"
          default:  # actually refers to default limits
            memory: "24Gi"
            cpu: "4"
            nvidia.com/gpu: "0"
          defaultRequest:  # default requests
            memory: "4Gi"
            cpu: "1"
            nvidia.com/gpu: "0"