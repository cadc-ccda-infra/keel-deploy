# Shared defaults for skaha — keys taken from
# opencadc/deployments/helm/applications/skaha/values.yaml only (no ad-hoc keys).
# Everything else (replicaCount, skahaWorkload, registryHosts, image, redis, ingress, …) uses the chart.
#
# Note: templates reference deployment.skaha.skahaTld for skaha.homedir, but that key is not in
# values.yaml; do not invent it here. Fix belongs in the chart (or accept the template default).

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  fsGroup: 8675309
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Skaha web service deployment
deployment:
  skaha:
    imagePullSecrets:
      - name: bucket-registry-auth
    imagePullPolicy: Always
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: skaha.opencadc.org/node-type
                operator: In
                values:
                  - service-node
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.count
                operator: DoesNotExist

    # Space delimited list of allowed Image Registry hosts.  These hosts should match the hosts in the User Session images.
    registryHosts: "images.canfar.net"

    # The group name to verify users against for permission to use the Science Platform.
    usersGroup: "ivo://cadc.nrc.ca/gms?skaha-users"

    adminsGroup: "ivo://cadc.nrc.ca/gms?skaha-admins"

    headlessGroup: "ivo://cadc.nrc.ca/gms?skaha-users"

    headlessPriorityGroup: "ivo://cadc.nrc.ca/gms?skaha-priority-headless-users"

    headlessPriorityClass:
      create: false
      name: uber-user-preempt-high

    priorityClass:
      create: false
      name: uber-user-preempt-high

    loggingGroups:
      - "ivo://cadc.nrc.ca/gms?CADC"

    # URI or URL of the OIDC (IAM) server
    oidcURI: ivo://cadc.nrc.ca/gms

    # ID (URI) of the GMS Service.
    gmsID: ivo://cadc.nrc.ca/gms

    # The Resource ID of the Service that contains the Posix Mapping information.  For CANFAR, this is set
    # in the cadc-registry.properties file.
    posixMapperResourceID: "ivo://cadc.nrc.ca/gms"

    # The IdentityManager class handling authentication.  This should generally be left alone
    identityManagerClass: ca.nrc.cadc.ac.ACIdentityManager

    # Setting to control how often image registry is queried for available images.
    imageCache:
      refreshSchedule: "*/15 * * * *"

    # Ten (10) minutes cache TTL for posix mapper results
    posixMapperCacheTTLSeconds: "600"

    cookieSignaturePublicKey:
      existingSecret:
        # Secret name (release namespace).
        name: canfar-skaha-staging-cookie-signature-public-key
        # Filename under `/config` in the pod; defaults to **`RsaSignaturePub.key`** (must match Secret data entry name).
        path: RsaSignaturePub.key

    # Settings for User Sessions.
    sessions:
      gpuEnabled: true
      expirySeconds: "345600"
      maxCount: "3"
      nodeLabelSelector: "skaha.opencadc.org/node-type=worker-node"
      nodeAffinity:
        # Only allow executions of User Sessions on specific Nodes.
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: skaha.opencadc.org/node-type
                  operator: NotIn
                  values:
                    - service-node

      # Declare extra volume mounts in User Sessions.  The "type: parameter in volume section is constant.
      # @see https://github.com/opencadc/deployments/blob/main/helm/applications/skaha/values.yaml#L166 for possible configurations.
      extraVolumes:
        - name: cvmfs
          volume:
            type: HOST_PATH # HOST_PATH is for host path
            hostPath: "/cvmfs/"
            hostPathType: Directory
          volumeMount:
            mountPath: "/cvmfs"
            readOnly: true
            mountPropagation: HostToContainer

      userStorage:
        topLevelDirectory: "/arc"

        nodeURIPrefix: "vos://cadc.nrc.ca~arc"
        serviceURI: "ivo://cadc.nrc.ca/arc"

    # Resources provided to the Skaha service.
    resources:
      limits:
        cpu: "2"
        memory: 3Gi
      requests:
        cpu: "20m"
        memory: 3Gi

    # Optionally mount a custom CA certificate
    extraVolumeMounts:
      - mountPath: /usr/share/tomcat/.ssl/
        name: servops-cert
        readOnly: true

    # Create the CA certificate volume to be mounted in extraVolumeMounts
    extraVolumes:
      - name: servops-cert
        secret:
          defaultMode: 420
          secretName: servops-clientcert

experimentalFeatures:
  enabled: false

redis:
  networkPolicy:
    enabled: false
  serviceAccount:
    create: false
  master:
    serviceAccount:
      create: false

# deployment.hostname: integration.yaml, staging.yaml, prod.yaml
