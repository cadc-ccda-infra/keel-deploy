# Only ingress; all other settings use the chart defaults
# (opencadc/deployments/helm/applications/canfar-web-portal/values.yaml).
# UID/GID 101: `nginx` user in official nginx:alpine (match the portal image base).

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
