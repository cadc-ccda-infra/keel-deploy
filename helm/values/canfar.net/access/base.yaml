# Shared defaults for access (align with chart values.yaml:
# opencadc/deployments/helm/applications/access/values.yaml).
#
# RSA keys: pre-create a Secret named below with keys RsaSignaturePub.key (PEM).

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  fsGroup: 8675309
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

replicaCount: 1

# image.repository / image.tag / image.pullPolicy: use the chart's values.yaml (released with each chart version).
# Override these values in the environment-specific values.yaml files, unless a different image is needed more globally.

ingress:
  enabled: true
  className: ""
  annotations: {}
  # hosts and tls: set per environment (integration.yaml, staging.yaml, prod.yaml).

resources:
  requests:
    memory: "500M"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "750m"
