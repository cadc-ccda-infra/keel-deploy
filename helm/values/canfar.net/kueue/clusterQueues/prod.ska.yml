# ClusterQueue
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: ska
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: [canfar-workloads]
  queueingStrategy: BestEffortFIFO
  cohortName: canfar
  resourceGroups:
    - coveredResources: ["cpu", "memory", "ephemeral-storage"]
      flavors:
        - name: "default-worker"
          resources:
            - name: "cpu"
              nominalQuota: "192"
              lendingLimit: "192"
            - name: "memory"
              nominalQuota: "768Gi"
              lendingLimit: "768Gi"
            - name: "ephemeral-storage"
              nominalQuota: "1500Gi"
              lendingLimit: "1500Gi"
    - coveredResources: ["cpu", "memory", "ephemeral-storage", "nvidia.com/gpu"]
      flavors:
        - name: "gpu-worker"
          resources:
            - name: "cpu"
              nominalQuota: "96"
              lendingLimit: "96"
            - name: "memory"
              nominalQuota: "1000Gi"
              lendingLimit: "1000Gi"
            - name: "ephemeral-storage"
              nominalQuota: "3000Gi"
              lendingLimit: "3000Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: "28"
              lendingLimit: "28"
  preemption:
    reclaimWithinCohort: LowerPriority
    borrowWithinCohort:
      policy: LowerPriority
      maxPriorityThreshold: 10000
    withinClusterQueue: LowerPriority
  stopPolicy: None
