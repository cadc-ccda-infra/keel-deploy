# ClusterQueue
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: ska
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: [canfar-workloads]
  queueingStrategy: BestEffortFIFO
  cohortName: canfar
  admissionScope:
    admissionMode: UsageBasedAdmissionFairSharing
  resourceGroups:
    - coveredResources: ["cpu", "memory", "ephemeral-storage", "nvidia.com/gpu"]
      flavors:
        - name: "default"
          resources:
            - name: "cpu"
              nominalQuota: "200"
              lendingLimit: "200"
            - name: "memory"
              nominalQuota: "1600Gi"
              lendingLimit: "1600Gi"
            - name: "ephemeral-storage"
              nominalQuota: "4800Gi"
              lendingLimit: "4800Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: "0"
              lendingLimit: "0"
  preemption:
    reclaimWithinCohort: LowerPriority
    borrowWithinCohort:
      policy: LowerPriority
      maxPriorityThreshold: 10000
    withinClusterQueue: LowerPriority
  stopPolicy: None
