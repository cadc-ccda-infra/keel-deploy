# ClusterQueue
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: cadc
  labels:
    app.kubernetes.io/name: kueue
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: [canfar-workloads]
  queueingStrategy: BestEffortFIFO
  cohortName: canfar
  admissionScope:
    admissionMode: UsageBasedAdmissionFairSharing
  resourceGroups:
    - coveredResources: ["cpu", "memory", "ephemeral-storage", "nvidia.com/gpu"]
      flavors:
        - name: "default"
          resources:
            - name: "cpu"
              nominalQuota: "2800"
              lendingLimit: "2800"
            - name: "memory"
              nominalQuota: "12400Gi"
              lendingLimit: "12400Gi"
            - name: "ephemeral-storage"
              nominalQuota: "99200Gi"
              lendingLimit: "99200Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: "112"
              lendingLimit: "112"
  preemption:
    reclaimWithinCohort: LowerPriority
    borrowWithinCohort:
      policy: LowerPriority
      maxPriorityThreshold: 10000
    withinClusterQueue: LowerPriority
  stopPolicy: None
