# ClusterQueue
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: cadc
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: [canfar-workloads]
  queueingStrategy: BestEffortFIFO
  cohortName: canfar
  resourceGroups:
    - coveredResources: ["cpu", "memory", "ephemeral-storage"]
      flavors:
        - name: "default-worker"
          resources:
            - name: "default-worker"
              nominalQuota: "3264"
              lendingLimit: "3264"
            - name: "memory"
              nominalQuota: "12000Gi"
              lendingLimit: "12000Gi"
            - name: "ephemeral-storage"
              nominalQuota: "40000Gi"
              lendingLimit: "40000Gi"
    - coveredResources: ["cpu", "memory", "ephemeral-storage", "nvidia.com/gpu"]
      flavors:
        - name: "gpu-worker"
          resources:
            - name: "cpu"
              nominalQuota: "288"
              lendingLimit: "288"
            - name: "memory"
              nominalQuota: "3000Gi"
              lendingLimit: "3000Gi"
            - name: "ephemeral-storage"
              nominalQuota: "9000Gi"
              lendingLimit: "9000Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: "84"
              lendingLimit: "84"
  preemption:
    reclaimWithinCohort: LowerPriority
    borrowWithinCohort:
      policy: LowerPriority
      maxPriorityThreshold: 10000
    withinClusterQueue: LowerPriority
  stopPolicy: None
