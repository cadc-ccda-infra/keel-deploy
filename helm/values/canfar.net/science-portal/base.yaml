# Shared defaults for science-portal — keys from
# opencadc/deployments/helm/applications/science-portal/values.yaml only.
# replicaCount, image, resources, redis, tabLabels, defaultProjectName, ingress path: chart defaults.

podSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  fsGroup: 8675309
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

deployment:
  sciencePortal:
    gmsID: "ivo://cadc.nrc.ca/gms"
    
    identityManagerClass: ca.nrc.cadc.ac.ACIdentityManager

    theme:
      name: canfar
      logoURL: "https://www.canfar.net/css/images/logo.png"

