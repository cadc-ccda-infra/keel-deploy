imagePullSecrets:
  - name: ghcr-at88mph-science-portal

image:
  repository: images.opencadc.org/platform/science-portal
  tag: v2.0.0-rc-002
  pullPolicy: Always

ingress:
  hosts:
    - host: staging.canfar.net
      paths:
        - path: /science-portal
          pathType: Prefix

app:
  api:
    storage: "https://staging.canfar.net/arc/nodes/home/"
    skaha: "https://staging.canfar.net/skaha"
  public:
    api:
      skaha: "https://staging.canfar.net/skaha"
    services:
      storageManagement: "https://staging.canfar.net/storage/list"
      sciencePortal: "https://staging.canfar.net/science-portal"
  auth:
    nextauthUrl: "https://staging.canfar.net/science-portal"
