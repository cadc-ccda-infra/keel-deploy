# Only ingress; all other settings use the chart defaults
# (opencadc/deployments/helm/applications/canfar-web-root/values.yaml).
# Path prefixes per environment: integration.yaml, staging.yaml, prod.yaml.

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  fsGroup: 8675309
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

ingress:
  enabled: true
  className: ""
  annotations: {}
