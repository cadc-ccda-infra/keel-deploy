# Shared defaults for Skaha (opencadc platform chart).  API hostname, POSIX mapper URL,
# and sessions hostname: prod.yaml / staging.yaml.

kubernetesClusterDomain: keel-prod.local

replicaCount: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  fsGroup: 8675309
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

autoscaling:
  minReplicas: 1
  maxReplicas: 2

deployment:
  skaha:
    imagePullPolicy: Always
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: skaha.opencadc.org/node-type
                operator: In
                values:
                  - service-node
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.count
                operator: DoesNotExist

    defaultQuotaGB: "100"

    usersGroup: "ivo://skao.int/gms?roles/prod/user"
    adminsGroup: "ivo://skao.int/gms?roles/prod/user"
    headlessGroup: "ivo://skao.int/gms?roles/prod/user"
    headlessPriorityGroup: "ivo://skao.int/gms?roles/prod/user"
    headlessPriorityClass: "uber-user-preempt-high"

    loggingGroups:
      - "ivo://skao.int/gms?roles/prod/user"

    oidcURI: https://ska-iam.stfc.ac.uk/

    gmsID: ivo://skao.int/gms

    imageCache:
      refreshSchedule: "*/15 * * * *"

    posixMapperCacheTTLSeconds: "600"

    # The IdentityManager class handling authentication.  This should generally be left alone
    identityManagerClass: org.opencadc.auth.StandardIdentityManager

    sessions:
      expirySeconds: "345600"
      maxCount: "3"
      minEphemeralStorage: "20Gi"
      maxEphemeralStorage: "100Gi"
      nodeLabelSelector: "skaha.opencadc.org/node-type=worker-node"

      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: skaha.opencadc.org/node-type
                  operator: NotIn
                  values:
                    - service-node

      userStorage:
        topLevelDirectory: "/cavern"
        spec:
          persistentVolumeClaim:
            claimName: canfar-workloads-cavern-pvc
        nodeURIPrefix: "vos://canfar.net~staging-src~cavern"
        serviceURI: "ivo://canfar.net/staging-src/cavern"

      extraVolumes:
        - name: cvmfs
          volume:
            type: HOST_PATH
            hostPath: "/cvmfs/"
            hostPathType: Directory
          volumeMount:
            mountPath: "/cvmfs"
            readOnly: true
            mountPropagation: HostToContainer

    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: "20m"
        memory: 300Mi

    priorityClass:
      name: uber-user-preempt-high
      create: false

experimentalFeatures:
  enabled: false

secrets: {}

redis:
  networkPolicy:
    enabled: false
  serviceAccount:
    create: false
  master:
    serviceAccount:
      create: false
