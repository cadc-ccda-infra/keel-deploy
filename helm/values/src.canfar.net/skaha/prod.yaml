deployment:
  hostname: src.canfar.net
  skaha:
    posixMapperResourceID: "https://src.canfar.net/posix-mapper"
    sessions:
      hostname: workloads.canfar.net
      namespace: canfar-src-workloads

      limitRange:
        enabled: true
        rbac:
          create: false
        spec:
          max:
            memory: "96Gi"
            cpu: "8"
            nvidia.com/gpu: "2"
          default:
            memory: "12Gi"
            cpu: "2"
            nvidia.com/gpu: "0"
          defaultRequest:
            memory: "4Gi"
            cpu: "1"
            nvidia.com/gpu: "0"