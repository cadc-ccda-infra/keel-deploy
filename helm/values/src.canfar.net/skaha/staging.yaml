metricsBackend:
  enabled: false
  env:
    METRICS_ENVIRONMENT: "staging"

deployment:
  hostname: staging-src.canfar.net
  skaha:
    image: images-rc.canfar.net/skaha-system/skaha:1.3.0-20260512T144159
    registryHosts: "images-rc.canfar.net"
    posixMapperResourceID: "https://staging-src.canfar.net/posix-mapper"
    sessions:
      hostname: workloads.canfar.net
      namespace:
        create: true
        name: canfar-src-workloads-staging

      gpuEnabled: true

      kueue:
        rbac:
          create: true
        default:
          queueName: "cadc-default"
          priorityClass: "high"
        headless:
          queueName: "cadc-default"
          priorityClass: "low"

      limitRange:
        enabled: true
        rbac:
          create: true
        spec:
          max:
            memory: "64Gi"
            cpu: "8"
            nvidia.com/gpu: "2"
          default:
            memory: "8Gi"
            cpu: "2"
            nvidia.com/gpu: "0"
          defaultRequest:
            memory: "4Gi"
            cpu: "1"
            nvidia.com/gpu: "0"

serviceAccount:
  create: true