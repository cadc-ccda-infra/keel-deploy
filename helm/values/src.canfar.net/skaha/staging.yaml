metricsBackend:
  enabled: false
  rbac:
    enabled: false
  env:
    METRICS_ENVIRONMENT: "staging"

deployment:
  hostname: staging-src.canfar.net
  skaha:
    image: images-rc.canfar.net/skaha-system/skaha:1.3.1-rc.1
    registryHosts: "images.canfar.net"
    posixMapperResourceID: "https://staging-src.canfar.net/posix-mapper"

    registryURL:
      - "https://staging.canfar.net/reg"

    sessions:
      hostname: workloads.canfar.net
      namespace:
        create: true
        name: canfar-src-workloads

      gpuEnabled: true

      kueue:
        rbac:
          create: true
        default:
          queueName: "ska-default"
          priorityClass: "high"
        headless:
          queueName: "ska-default"
          priorityClass: "low"

      # Values that represent boundaries for the session resources.  Tune to your Cluster's capacity.
      limitRange:
        enabled: true
        rbac:
          create: true
        spec:
          # -- max is the maximum allowed requested for 'fixed' User Sessions.
          max:
            memory: "384Gi"
            cpu: "16"
            nvidia.com/gpu: "8"
          # -- default is the default limits for 'flex' User Sessions.  These Sessions will grow until this limit is reached.
          default:
            memory: "32Gi"
            cpu: "16"
            nvidia.com/gpu: "0"
          # -- defaultRequest is the default requests for 'flex' User Sessions.  All flex sessions will start with this request.
          defaultRequest:
            memory: "4Gi"
            cpu: "1"
            nvidia.com/gpu: "0"

      authorization:
        permissionsAPI:
          # @see https://permissions.srcnet.skao.int/api/openapi.json for the API specification.
          # -- When true, SKAHA_PERMISSIONS_API_*_ENABLED is set from baseURL, type, route, name, version, and method. Required baseURL when enabled (Helm validates). The Skaha service enforces mutually exclusive authorization modes at runtime.
          enabled: true
          # -- Required when enabled is true (Helm validates).
          baseURL: "https://permissions.srcnet.skao.int/api"
          authAPIBaseURL: "https://authn.srcnet.skao.int/api"
          name: "canfar-api"
          version: "1"

rbac:
  # Whether to create RBAC roles and bindings for Skaha.  Defaults to true.
  create: true

  # Whether to create a ClusterRole with read-only permissions for Skaha to query Nodes for their capacity.
  # This is used to provide information to the Science Portal UI about available resources in the cluster.
  # A simple node: list permission is granted, but this does require elevated privileges, so it is optional and defaults to false.
  clusterRole:
    create: false

serviceAccount:
  create: true