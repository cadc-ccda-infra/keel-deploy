# src.kawfee.ca staging — science-portal chart 2.0.0 (Next.js).
# Aligns with deployment/science-platform/kawfee/src.kawfee.ca/science-portal/values.yaml
# where applicable; OIDC redirect URIs follow NextAuth (/api/auth/callback/oidc).

replicaCount: 1

image:
  tag: dfa45c517fa297b88aaff3149a258252da8c2e29
  pullPolicy: Always

ingress:
  enabled: true
  hosts:
    - host: staging-src.canfar.net
      paths:
        - path: /science-portal
          pathType: Prefix

app:
  api:
    storage: "https://staging-src.canfar.net/storage"
    srcCavern: "https://staging-src.canfar.net/cavern/nodes/home/"
    srcSkaha: "https://staging-src.canfar.net/skaha"
  public:
    api:
      srcSkaha: "https://staging-src.canfar.net/skaha"
      srcCavern: "https://staging-src.canfar.net/cavern/nodes/home/"
    services:
      storageManagement: "https://staging-src.canfar.net/storage/list"
      sciencePortal: "https://staging-src.canfar.net/science-portal"
    srcnetLogoUrl: "/science-portal/canSRCLogo.png"

  auth:
    trustHost: true
    nextauthUrl: https://staging-src.canfar.net
    authSecret:
      existingSecret: science-portal-secrets
      secretKey: auth-secret

  oidc:
    enabled: true
    uri: https://ska-iam.stfc.ac.uk/
    clientId: 551f1415-60d7-42a5-a977-11fd69700fe0
    callbackUri: https://staging-src.canfar.net/science-portal
    redirectUri: https://staging-src.canfar.net/science-portal/api/auth/callback/oidc
    scope: openid profile offline_access
    clientSecret:
      existingSecret: science-portal-oidc-secret-staging-src
      secretKey: oidc-client-secret
