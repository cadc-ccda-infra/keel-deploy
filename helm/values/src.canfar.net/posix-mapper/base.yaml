# Shared defaults for POSIX Mapper (opencadc platform chart).  Hostname and service
# resourceID: prod.yaml / staging.yaml.

kubernetesClusterDomain: keel-prod.local

replicaCount: 1

securityContext:
  seccompProfile:
    type: RuntimeDefault

deployment:
  posixMapper:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: skaha.opencadc.org/node-type
                operator: In
                values:
                  - service-node
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.count
                operator: DoesNotExist

    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1500m"

    minUID: 10000
    minGID: 900000

    oidcURI: https://ska-iam.stfc.ac.uk/

    gmsID: ivo://skao.int/gms

    registryURL: "https://reg.swesrc.chalmers.se"

secrets: {}

# Database for UID/GID mappings (same JDBC as local deploy unless overridden per env).
postgresql:
  maxActive: 8
  url: jdbc:postgresql://quokka.canfar.net:8601/mapping
  schema: mapping
  auth:
    username: posixmapper
    password: CVFn67?Oq4?A
