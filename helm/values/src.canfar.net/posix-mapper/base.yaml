# Shared defaults for POSIX Mapper (opencadc platform chart).  Hostname and service
# resourceID: prod.yaml / staging.yaml.

kubernetesClusterDomain: keel-prod.local
replicaCount: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8675309
  runAsGroup: 8675309
  fsGroup: 8675309
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

deployment:
  posixMapper:
    loggingGroups:
      - "ivo://skao.int/gms?roles/prod/user"

    # Resources provided to the Skaha service.
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1500m"

    minUID: 10000
    minGID: 900000

    oidcURI: https://ska-iam.stfc.ac.uk/

    gmsID: ivo://skao.int/gms

    registryURL: "https://reg.swesrc.chalmers.se"

secrets: {}

# Database for UID/GID mappings (same JDBC as local deploy unless overridden per env).
postgresql:
  maxActive: 8
  url: jdbc:postgresql://quokka.canfar.net:8601/mapping
  schema: mapping
  auth:
    username: posixmapper
    password: CVFn67?Oq4?A
