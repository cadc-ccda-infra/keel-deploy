apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cadc-reg
  namespace: cadc-argocd
  labels:
    argocd.argoproj.io/domain: cadc-west-1.canfar.net
    argocd.argoproj.io/environment: production
    argocd.argoproj.io/service: reg
spec:
  project: cadc
  sources:
    - repoURL: https://images-rc.canfar.net/chartrepo/library
      chart: reg
      targetRevision: 1.2.1-rc.2
      helm:
        valueFiles:
          - $values/helm/values/cadc-west.canfar.net/reg/base.yaml
          - $values/helm/values/cadc-west.canfar.net/reg/prod.yaml
    - repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cadc-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
