# Template application for cadc-ccda (production — unsuffixed filename).
# Copy this tree and adjust names when adding a real service.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cadc-example-app
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: cadc-ccda
    argocd.argoproj.io/environment: production
    argocd.argoproj.io/service: example-app
spec:
  project: default
  sources:
    - repoURL: oci://harbor.example.com/cadc/charts
      chart: example-app
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/helm/values/cadc-ccda/example-app/base.yaml
          - $values/helm/values/cadc-ccda/example-app/prod.yaml
    - repoURL: https://git.example.com/your-org/argo-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cadc-example-app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
