apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-access
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: canfar.net
    argocd.argoproj.io/environment: production
    argocd.argoproj.io/service: access
spec:
  project: default
  sources:
    - repoURL: oci://harbor.example.com/canfar/charts
      chart: access
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/helm/values/canfar.net/access/base.yaml
          - $values/helm/values/canfar.net/access/prod.yaml
    - repoURL: https://git.example.com/your-org/argo-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-access
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
