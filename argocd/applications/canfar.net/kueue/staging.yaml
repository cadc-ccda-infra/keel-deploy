apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-kueue-staging-cadc
  namespace: canfar-argocd
  labels:
    argocd.argoproj.io/domain: canfar.net
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: kueue
spec:
  project: canfar
  source:
    repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
    targetRevision: main
    path: helm/values/canfar.net/kueue
    directory:
      recurse: true
      include: '{localQueues/prod.cadc.yml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-workloads
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
