apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-science-portal-integration
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: canfar.net
    argocd.argoproj.io/environment: integration
    argocd.argoproj.io/service: science-portal
spec:
  project: default
  sources:
    - repoURL: oci://harbor.example.com/canfar/charts
      chart: scienceportal
      targetRevision: 1.2.0
      helm:
        valueFiles:
          - $values/helm/values/canfar.net/science-portal/base.yaml
          - $values/helm/values/canfar.net/science-portal/integration.yaml
    - repoURL: https://git.example.com/your-org/argo-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-science-portal-integration
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
