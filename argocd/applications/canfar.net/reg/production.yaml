apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-reg
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: canfar.net
    argocd.argoproj.io/environment: production
    argocd.argoproj.io/service: reg
spec:
  project: default
  sources:
    - repoURL: https://images-rc.canfar.net/chartrepo/library
      chart: reg
      targetRevision: 1.0.0
      helm:
        valueFiles:
          - $values/helm/values/canfar.net/reg/base.yaml
          - $values/helm/values/canfar.net/reg/prod.yaml
    - repoURL: https://git.example.com/your-org/argo-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-reg
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
