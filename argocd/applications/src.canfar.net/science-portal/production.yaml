apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-science-portal
  namespace: canfar-argocd
  labels:
    argocd.argoproj.io/domain: src.canfar.net
    argocd.argoproj.io/environment: production
    argocd.argoproj.io/service: science-portal
spec:
  project: canfar
  sources:
    - repoURL: https://images.opencadc.org/chartrepo/platform
      chart: science-portal
      targetRevision: 2.1.1
      helm:
        valueFiles:
          - $values/helm/values/src.canfar.net/science-portal/base.yaml
          - $values/helm/values/src.canfar.net/science-portal/prod.yaml
    - repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-src-production  
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
