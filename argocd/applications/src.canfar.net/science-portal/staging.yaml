apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-science-portal-staging
  namespace: canfar-argocd
  labels:
    argocd.argoproj.io/domain: staging-src.canfar.net
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: science-portal
spec:
  project: canfar
  sources:
    - repoURL: https://images-rc.canfar.net/chartrepo/skaha-system
      chart: science-portal
      targetRevision: 2.0.0-rc-001
      helm:
        valueFiles:
          - $values/helm/values/src.canfar.net/science-portal/base.yaml
          - $values/helm/values/src.canfar.net/science-portal/staging.yaml
    - repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-src-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
