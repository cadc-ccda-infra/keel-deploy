apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-cavern-staging
  namespace: canfar-argocd
  labels:
    argocd.argoproj.io/domain: staging-src.canfar.net
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: cavern
spec:
  project: canfar
  sources:
    - repoURL: https://images-rc.canfar.net/chartrepo/skaha-system
      chart: cavern
      targetRevision: 0.11.1
      helm:
        valueFiles:
          - $values/helm/values/src.canfar.net/cavern/base.yaml
          - $values/helm/values/src.canfar.net/cavern/staging.yaml
    - repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-src-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
