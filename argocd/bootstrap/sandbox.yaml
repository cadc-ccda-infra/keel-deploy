# Parent Application (app-of-apps) for sandbox (sc2.canfar.net).
# Apply once: kubectl apply -f argocd/bootstrap/sandbox.yaml
# Replace spec.source.repoURL with this repository's clone URL before applying.
# Child and parent Application CRs use namespace cadc-argocd; create it and grant Argo CD
# permission to manage Application resources there (cluster setup dependent).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sandbox-apps
  namespace: cadc-argocd
spec:
  project: cadc
  source:
    repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
    targetRevision: main
    ref: values
    path: argocd/applications/sandbox
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cadc-argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
