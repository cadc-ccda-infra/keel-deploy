# Parent Application (app-of-apps) for canfar.net.
# Apply once: kubectl apply -f argocd/bootstrap/canfar.net.yaml
# Replace spec.source.repoURL with this repository's clone URL before applying.
# Child and parent Application CRs use namespace canfar-argocd; create it and grant Argo CD
# permission to manage Application resources there (cluster setup dependent).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-net-apps
  namespace: canfar-argocd
spec:
  project: default
  source:
    repoURL: https://git.example.com/your-org/argo-deploy.git
    targetRevision: main
    path: argocd/applications/canfar.net
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
